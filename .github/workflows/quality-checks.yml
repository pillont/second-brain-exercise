name: Quality Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'source/**'
      - '.github/workflows/quality-checks.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'source/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock pytest-asyncio
        pip install mypy flake8 black pylint radon
        pip install magicmock

    - name: Check code formatting with Black
      run: |
        python -m black --check source/
      continue-on-error: false

    - name: Lint with Flake8 (PEP 8)
      run: |
        python -m flake8 source/ --count --show-source --statistics
      continue-on-error: false

    - name: Type check with MyPy
      run: |
        python -m mypy source/lib
      continue-on-error: false

    - name: Run unit tests
      run: |
        python -m pytest source/lib_test/unit/ -v \
          --tb=short \
          --cov=source/lib \
          --cov-report=xml \
          --cov-report=term-missing
      continue-on-error: false

    - name: Run integration tests
      run: |
        python -m pytest source/lib_test/integration/ -v \
          --tb=short \
          --cov=source/lib \
          --cov-append \
          --cov-report=xml \
          --cov-report=term-missing
      continue-on-error: false

    - name: Check code complexity
      run: |
        python -m radon cc source/lib -a --show-closures
        python -m radon mi source/lib -nb -s
      continue-on-error: true

    - name: Pylint code analysis
      run: |
        python -m pylint source/lib --exit-zero --disable=C0111,C0103,R0903,R0913
      continue-on-error: true

    - name: Upload coverage reports to Codecov (if configured)
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: matrix.python-version == '3.10'
      continue-on-error: true

    - name: Report test coverage
      run: |
        python -m pytest source/lib_test/ --cov=source/lib --cov-report=term --cov-report=html:htmlcov
      continue-on-error: true

    - name: Archive coverage artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
      if: always()
      continue-on-error: true
