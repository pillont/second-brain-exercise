name: Quality Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'source/**'
      - '.github/workflows/quality-checks.yml'
      - 'requirements.txt'

  pull_request:
    branches: [ main, develop ]
    paths:
      - 'source/**'
      - '.github/workflows/quality-checks.yml'
      - 'requirements.txt'
      
jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock pytest-asyncio
        pip install mypy flake8 black pylint radon
        pip install pip-audit isort
        pip install magicmock

    - name: Check code formatting with Black
      run: |
        python -m black --check source/

    - name: Check imports order with isort
      run: |
        python -m isort source/ --check-only

    - name: Lint with Flake8 (PEP 8)
      run: |
        python -m flake8 source/ --count --show-source --statistics

    - name: Pylint code analysis
      run: python -m pylint source/

    - name: Type check with MyPy
      run: |
        python -m mypy source/ --explicit-package-bases

    # - name: Security analysis with Bandit
    #   run: |
    #     python -m bandit -r source/

    - name: Check dependencies vulnerabilities
      run: |
        python -m pip_audit --ignore-vuln CVE-2026-3219
        
    - name: Check StrEnum usage
      run: |
        ! grep -rn "str, Enum\|Enum, str" source/ --include="*.py"

    - name: No inline pylint disables
      run: |
        ! grep -rn "# pylint: disable" source/ --include="*.py"

    - name: Run unit tests (min 80% coverage)
      run: |
        python -m pytest source/tests/unit/ -v \
          --tb=short \
          --cov=source \
          --cov-branch \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=80

    - name: Run integration tests (min 80% coverage)
      run: |
        python -m pytest source/tests/integration/ -v \
          --tb=short \
          --cov=source \
          --cov-branch \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=80

    - name: Check code complexity
      run: |
        python -m radon cc source/ -n B --average
        python -m radon cc source/ --min B --exit-status